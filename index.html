<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Travel Tracker Pro</title>
  <meta name="color-scheme" content="dark">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    :root {
      --primary: #2563eb; --surface: #1e293b; --border: #334155;
      --text: #f1f5f9; --text-muted: #cbd5e1; --danger: #ef4444;
      --success: #10b981; --bg: #0f172a;
    }
    body { background: linear-gradient(135deg, #0f172a 0%, #1a1f36 100%); color: var(--text); }
    .container { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
    .sidebar h2 { margin: 0 0 20px 0; font-size: 18px; }
    .nav-item { display: block; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer; color: var(--text); text-align: center; transition: all 0.2s; }
    .nav-item:hover { background: var(--primary); border-color: var(--primary); }
    .nav-item.active { background: var(--primary); border-color: var(--primary); }
    .main { padding: 30px; overflow-y: auto; }
    .header { margin-bottom: 30px; }
    .header h1 { margin: 0 0 10px 0; font-size: 28px; }
    .header p { margin: 0; color: var(--text-muted); }
    .view { display: none; }
    .view.active { display: block; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-align: center; }
    .kpi-value { font-size: 28px; font-weight: bold; color: var(--primary); }
    .kpi-label { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
    .list-container { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .list-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
      align-items: center; transition: background 0.2s; }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: var(--bg); }
    .list-item-main { flex: 1; }
    .list-item-title { font-size: 16px; font-weight: 500; margin: 0 0 5px 0; }
    .list-item-subtitle { font-size: 12px; color: var(--text-muted); margin: 0; }
    .list-item-actions { display: flex; gap: 8px; }
    .btn { padding: 10px 15px; background: var(--primary); border: none; border-radius: 6px; color: white;
      cursor: pointer; transition: opacity 0.2s; font-size: 14px; }
    .btn:hover { opacity: 0.8; }
    .btn-danger { background: var(--danger); }
    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 14px; margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
      z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 30px; max-width: 500px; width: 90%; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h2 { margin: 0; }
    .modal-close { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    .expense-category { display: inline-block; background: var(--primary); color: white; padding: 4px 8px;
      border-radius: 4px; font-size: 12px; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2>Travel Tracker</h2>
      <button class="nav-item active" onclick="switchView('dashboard')">📊 Overview</button>
      <button class="nav-item" onclick="switchView('trips')">✈️ Trips</button>
      <button class="nav-item" onclick="switchView('expenses')">💳 Expenses</button>
      <button class="nav-item" onclick="switchView('notes')">📝 Notes</button>
      <button class="btn" style="width: 100%; margin-top: 30px;" onclick="exportData()">⬇️ Export</button>
      <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="document.getElementById('importFile').click()">⬆️ Import</button>
      <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
    </div>
    <div class="main">
      <div class="header">
        <h1>Travel Tracker Pro</h1>
        <p>Organize your trips, expenses, and travel notes</p>
      </div>

      <div id="dashboard-view" class="view active">
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-value" id="tripCount">0</div>
            <div class="kpi-label">Active Trips</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="totalSpent">$0</div>
            <div class="kpi-label">Total Spent</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="noteCount">0</div>
            <div class="kpi-label">Notes</div>
          </div>
        </div>
        <button class="btn" style="width: 100%;" onclick="openModal('tripModal')">+ Add Trip</button>
      </div>

      <div id="trips-view" class="view">
        <button class="btn" style="margin-bottom: 20px;" onclick="openModal('tripModal')">+ New Trip</button>
        <div class="list-container" id="tripsList"></div>
      </div>

      <div id="expenses-view" class="view">
        <button class="btn" style="margin-bottom: 20px;" onclick="openModal('expenseModal')">+ New Expense</button>
        <div class="list-container" id="expensesList"></div>
      </div>

      <div id="notes-view" class="view">
        <button class="btn" style="margin-bottom: 20px;" onclick="openModal('noteModal')">+ New Note</button>
        <div class="list-container" id="notesList"></div>
      </div>
    </div>
  </div>

  <div id="tripModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add Trip</h2>
        <button class="modal-close" onclick="closeModal('tripModal')">&times;</button>
      </div>
      <form onsubmit="saveTrip(event)">
        <div class="form-group">
          <label>Trip Name</label>
          <input type="text" id="tripName" required>
        </div>
        <div class="form-group">
          <label>Destination</label>
          <input type="text" id="tripDestination" required>
        </div>
        <div class="form-group">
          <label>Budget ($)</label>
          <input type="number" id="tripBudget" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="tripStart" required>
        </div>
        <div class="form-group">
          <label>End Date (optional)</label>
          <input type="date" id="tripEnd">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('tripModal')">Cancel</button>
          <button type="submit" class="btn">Save Trip</button>
        </div>
      </form>
    </div>
  </div>

  <div id="expenseModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add Expense</h2>
        <button class="modal-close" onclick="closeModal('expenseModal')">&times;</button>
      </div>
      <form onsubmit="saveExpense(event)">
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="expenseDesc" required>
        </div>
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="expenseAmount" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="expenseCategory" required>
            <option>Food</option>
            <option>Transport</option>
            <option>Accommodation</option>
            <option>Activities</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Trip (optional)</label>
          <select id="expenseTrip"></select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="expenseDate" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('expenseModal')">Cancel</button>
          <button type="submit" class="btn">Save Expense</button>
        </div>
      </form>
    </div>
  </div>

  <div id="noteModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add Note</h2>
        <button class="modal-close" onclick="closeModal('noteModal')">&times;</button>
      </div>
      <form onsubmit="saveNote(event)">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="noteTitle" required>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="noteType">
            <option>Tip</option>
            <option>Warning</option>
            <option>Memory</option>
            <option>Itinerary</option>
          </select>
        </div>
        <div class="form-group">
          <label>Content</label>
          <textarea id="noteContent" required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('noteModal')">Cancel</button>
          <button type="submit" class="btn">Save Note</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const store = {
      trips: [],
      expenses: [],
      notes: [],
      load() {
        const data = localStorage.getItem('travelTrackerData');
        if (data) {
          const parsed = JSON.parse(data);
          this.trips = parsed.trips || [];
          this.expenses = parsed.expenses || [];
          this.notes = parsed.notes || [];
        }
      },
      save() {
        localStorage.setItem('travelTrackerData', JSON.stringify({
          trips: this.trips,
          expenses: this.expenses,
          notes: this.notes
        }));
      },
      addTrip(trip) {
        this.trips.push({ ...trip, id: Date.now() });
        this.save();
      },
      addExpense(expense) {
        this.expenses.push({ ...expense, id: Date.now() });
        this.save();
      },
      addNote(note) {
        this.notes.push({ ...note, id: Date.now() });
        this.save();
      },
      deleteTrip(id) {
        this.trips = this.trips.filter(t => t.id !== id);
        this.save();
      },
      deleteExpense(id) {
        this.expenses = this.expenses.filter(e => e.id !== id);
        this.save();
      },
      deleteNote(id) {
        this.notes = this.notes.filter(n => n.id !== id);
        this.save();
      }
    };

    function openModal(id) {
      document.getElementById(id).classList.add('active');
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }
    function switchView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(name + '-view').classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.target.classList.add('active');
    }
    function formatCurrency(num) {
      return '$' + num.toFixed(2);
    }
    function renderDashboard() {
      document.getElementById('tripCount').textContent = store.trips.length;
      document.getElementById('totalSpent').textContent = formatCurrency(store.expenses.reduce((sum, e) => sum + parseFloat(e.amount), 0));
      document.getElementById('noteCount').textContent = store.notes.length;
    }
    function renderTrips() {
      const html = store.trips.length ? store.trips.map(t => `
        <div class="list-item">
          <div class="list-item-main">
            <p class="list-item-title">${t.name}</p>
            <p class="list-item-subtitle">${t.destination} • ${formatCurrency(t.budget)} budget</p>
            <p class="list-item-subtitle">${t.start}${t.end ? ` to ${t.end}` : ' (one-way / open-ended)'}</p>
          </div>
          <button class="btn btn-danger" onclick="deleteTrip(${t.id})">Delete</button>
        </div>
      `).join('') : '<div class="empty-state">No trips yet. Create one to get started!</div>';
      document.getElementById('tripsList').innerHTML = html;
    }
    function renderExpenses() {
      const html = store.expenses.length ? store.expenses.map(e => `
        <div class="list-item">
          <div class="list-item-main">
            <p class="list-item-title">${e.description}</p>
            <p class="list-item-subtitle">
              <span class="expense-category">${e.category}</span>
              ${e.trip ? `Trip: ${e.trip}` : 'No trip assigned'}
            </p>
          </div>
          <div>
            <p style="margin: 0; font-weight: bold;">${formatCurrency(e.amount)}</p>
            <button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">Delete</button>
          </div>
        </div>
      `).join('') : '<div class="empty-state">No expenses yet.</div>';
      document.getElementById('expensesList').innerHTML = html;
    }
    function renderNotes() {
      const html = store.notes.length ? store.notes.map(n => `
        <div class="list-item">
          <div class="list-item-main">
            <p class="list-item-title">${n.title}</p>
            <p class="list-item-subtitle">${n.type} • ${n.content.substring(0, 50)}...</p>
          </div>
          <button class="btn btn-danger" onclick="deleteNote(${n.id})">Delete</button>
        </div>
      `).join('') : '<div class="empty-state">No notes yet.</div>';
      document.getElementById('notesList').innerHTML = html;
    }
    function render() {
      renderDashboard();
      renderTrips();
      renderExpenses();
      renderNotes();
      updateTripSelect();
    }
    function saveTrip(e) {
      e.preventDefault();
      store.addTrip({
        name: document.getElementById('tripName').value,
        destination: document.getElementById('tripDestination').value,
        budget: document.getElementById('tripBudget').value,
        start: document.getElementById('tripStart').value,
        end: document.getElementById('tripEnd').value
      });
      document.getElementById('tripModal').querySelector('form').reset();
      closeModal('tripModal');
      render();
    }
    function saveExpense(e) {
      e.preventDefault();
      store.addExpense({
        description: document.getElementById('expenseDesc').value,
        amount: document.getElementById('expenseAmount').value,
        category: document.getElementById('expenseCategory').value,
        trip: document.getElementById('expenseTrip').value,
        date: document.getElementById('expenseDate').value
      });
      document.getElementById('expenseModal').querySelector('form').reset();
      closeModal('expenseModal');
      render();
    }
    function saveNote(e) {
      e.preventDefault();
      store.addNote({
        title: document.getElementById('noteTitle').value,
        type: document.getElementById('noteType').value,
        content: document.getElementById('noteContent').value
      });
      document.getElementById('noteModal').querySelector('form').reset();
      closeModal('noteModal');
      render();
    }
    function deleteTrip(id) { store.deleteTrip(id); render(); }
    function deleteExpense(id) { store.deleteExpense(id); render(); }
    function deleteNote(id) { store.deleteNote(id); render(); }
    function updateTripSelect() {
      const select = document.getElementById('expenseTrip');
      select.innerHTML = '<option value="">-- None --</option>' + store.trips.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
    }
    function exportData() {
      const json = JSON.stringify(store, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'travel-tracker-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
    }
    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const data = JSON.parse(event.target.result);
        store.trips = data.trips || [];
        store.expenses = data.expenses || [];
        store.notes = data.notes || [];
        store.save();
        render();
        alert('Data imported successfully!');
      };
      reader.readAsText(file);
    }
    function initializeSampleData() {
      if (store.trips.length === 0) {
        store.trips = [
          { id: 1, name: "Europe Trip - Hyrox & Cities", destination: "Bologna → Warsaw → Milan", budget: 3500, start: "2026-04-02", end: "2026-05-01" },
          { id: 2, name: "Dallas - PBR World Finals", destination: "Dallas, Texas", budget: 1500, start: "2026-05-10", end: "2026-05-16" },
          { id: 3, name: "PA - Shane Gillis Event", destination: "Pennsylvania", budget: 500, start: "2026-07-17" }
        ];
        store.expenses = [
          { id: 101, description: "IAD-BLQ Flight", amount: 752.83, category: "Transport", trip: "Europe Trip - Hyrox & Cities", date: "2026-04-02" },
          { id: 102, description: "BLQ-WAW Flight (with CDG layover 1hr25min)", amount: 248.10, category: "Transport", trip: "Europe Trip - Hyrox & Cities", date: "2026-04-05" },
          { id: 103, description: "MXP-IAD Return Flight (via Istanbul, 7hr35min layover)", amount: 752.83, category: "Transport", trip: "Europe Trip - Hyrox & Cities", date: "2026-05-01" },
          { id: 104, description: "Frontier: IAD-DFW", amount: 379.96, category: "Transport", trip: "Dallas - PBR World Finals", date: "2026-05-10" },
          { id: 201, description: "Social Hub Bologna (Apr 3-5, 3PM-12PM)", amount: 511.92, category: "Accommodation", trip: "Europe Trip - Hyrox & Cities", date: "2026-04-03" },
          { id: 202, description: "Warsaw Airbnb (Apr 5-19, 4PM-11AM)", amount: 787.76, category: "Accommodation", trip: "Europe Trip - Hyrox & Cities", date: "2026-04-05" }
        ];
        store.notes = [
          { id: 301, title: "Bologna - Hyrox Singles Pro", type: "Itinerary", content: "Event on April 4th. Staying at Social Hub Bologna, Via Aristotele Fiorvanti 27. Check-in 3PM Apr 3, Check-out 12PM Apr 5." },
          { id: 302, title: "Warsaw - Hyrox Competitions", type: "Itinerary", content: "Hyrox Singles Open: April 16th. Hyrox Singles Pro: April 17th. Airbnb hosted by Vermouth Sp. Zoo. Arrive Apr 5 4PM, Depart Apr 19 11AM." },
          { id: 303, title: "TBD: April 19-30 (Eastern Europe Exploration)", type: "Warning", content: "Open itinerary for Lithuania, Latvia, and Serbia visits. NEEDS PLANNING: Accommodation and specific dates." },
          { id: 304, title: "Return Flight: Milan to DC", type: "Itinerary", content: "Depart Milan (MXP) 8:10PM, 2hr55min flight, Istanbul layover 7hr35min, Depart Istanbul 7:40AM, Arrive DC 11:35AM May 1st." },
          { id: 305, title: "Dallas - PBR Unleash the Beast World Finals", type: "Itinerary", content: "2026 PBR Unleash the Beast event. Arrive May 10 1:44PM, Depart May 16 4:11PM. NEEDS PLANNING: Hotel in Fort Worth area." },
          { id: 306, title: "PA Event - Shane Gillis Comedy Show", type: "Tip", content: "July 17 at 8PM in Pennsylvania. Driving from Virginia. NEEDS PLANNING: Accommodation (plan 1 week before)." }
        ];
        store.save();
      }
    }
    store.load();
    initializeSampleData();
    render();
  </script>
</body>
</html>
